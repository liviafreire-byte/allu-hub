const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

async function uploadMedia(file) {
  // Sanitiza o nome do arquivo: remove acentos, substitui espaços e caracteres especiais
  const ext          = file.name.split('.').pop().toLowerCase();
  const safeName     = file.name
    .normalize('NFD').replace(/[̀-ͯ]/g, '') // remove acentos
    .replace(/[^a-zA-Z0-9.\-_]/g, '-')               // caracteres especiais → hífen
    .replace(/-+/g, '-')                              // hifens duplos → único
    .toLowerCase();
  const filePath = `${Date.now()}-${safeName}`;

  console.log("SUPABASE UPLOAD — filePath:", filePath);
  console.log("SUPABASE UPLOAD — fileType:", file.type, "| fileSize:", file.size);

  const { data, error } = await supabaseClient.storage
    .from(SUPABASE_BUCKET)
    .upload(filePath, file, { cacheControl: "31536000", upsert: false });

  if (error) {
    console.error("Supabase upload error:", error);
    throw new Error(error.message);
  }

  console.log("UPLOAD RESULT:", data);

  const { data: publicData } = supabaseClient.storage
    .from(SUPABASE_BUCKET)
    .getPublicUrl(filePath);

  const mediaUrl = publicData.publicUrl;
  console.log("PUBLIC MEDIA URL:", mediaUrl);
  return mediaUrl;
}

// ─── InlineEdit ───────────────────────────────────────────────────────────────
const InlineEdit = ({ value, onSave, multiline, placeholder, style, tag }) => {
  const Tag      = tag || 'span';
  const [editing, setEditing] = useState(false);
  const [draft,   setDraft]   = useState(value || '');
  const ref = useRef(null);

  useEffect(() => { if (!editing) setDraft(value || ''); }, [value, editing]);

  const start  = () => { console.log('[allu] InlineEdit: clique para editar', { value }); setDraft(value || ''); setEditing(true); };
  const cancel = () => { setEditing(false); setDraft(value || ''); };
  const commit = () => {
    setEditing(false);
    const trimmed = draft.trim();
    if (trimmed !== (value || '').trim()) onSave(trimmed);
  };
  const onKeyDown = (e) => {
    if (e.key === 'Escape') { e.preventDefault(); cancel(); return; }
    if (e.key === 'Enter' && (!multiline || e.ctrlKey || e.metaKey)) { e.preventDefault(); commit(); }
  };
  useEffect(() => {
    if (editing && ref.current) {
      ref.current.focus();
      const len = ref.current.value.length;
      ref.current.setSelectionRange?.(len, len);
    }
  }, [editing]);

  if (editing) {
    const es = { fontFamily:'inherit', fontSize:'inherit', fontWeight:'inherit', lineHeight:'inherit', color:'inherit', letterSpacing:'inherit', background:'#f0fdf4', border:'1.5px solid #1E8549', borderRadius:6, padding:'2px 6px', width:'100%', outline:'none', resize: multiline ? 'vertical' : 'none', ...style };
    return multiline
      ? <textarea ref={ref} value={draft} onChange={e=>setDraft(e.target.value)} onBlur={commit} onKeyDown={onKeyDown} style={{...es, minHeight:56, display:'block'}} />
      : <input    ref={ref} value={draft} onChange={e=>setDraft(e.target.value)} onBlur={commit} onKeyDown={onKeyDown} style={es} />;
  }

  const displayStyle = { ...style, cursor:'text', borderRadius:4, padding:'1px 4px', display: (Tag==='p'||Tag==='div') ? 'block' : 'inline', minWidth:40 };
  return (
    <Tag onClick={start} title="Clique para editar" style={displayStyle} className="inline-edit-span">
      {value
        ? <>{value}</>
        : <span style={{color:'#9ca3af',fontStyle:'italic',fontWeight:400,fontSize:'0.9em'}}>{placeholder || 'Clique para editar'}</span>
      }
    </Tag>
  );
};

// ─── MediaUpload — upload real via Supabase Storage ──────────────────────────
const ACCEPT_IMAGE = 'image/jpeg,image/png,image/webp';
const ACCEPT_VIDEO = 'video/mp4,video/quicktime,video/webm';

const MediaUpload = memo(({ mediaURL, contentType, onSelect, onRemove }) => {
  const fileRef  = useRef(null);
  const [dragging,  setDragging]  = useState(false);
  const [uploading, setUploading] = useState(false);
  const [progress,  setProgress]  = useState(0);   // 0-100 (simulado enquanto faz upload)
  const [uploadErr, setUploadErr] = useState('');

  const acceptStr   = contentType === 'video' ? ACCEPT_VIDEO : ACCEPT_IMAGE;
  const helpText    = contentType === 'video' ? 'MP4, MOV ou WEBM — máx. 250 MB' : 'JPG, PNG ou WEBP — máx. 20 MB';
  const uploadLabel = contentType === 'video' ? 'Clique para selecionar o vídeo ou arraste aqui' : 'Clique para selecionar a imagem ou arraste aqui';
  const maxBytes    = contentType === 'video' ? 250 * 1024 * 1024 : 20 * 1024 * 1024;

  const processFile = useCallback(async (file) => {
    if (!file) return;
    setUploadErr('');
    const isImg = file.type.startsWith('image/');
    const isVid = file.type.startsWith('video/');
    if (contentType === 'image' && !isImg) { setUploadErr('Selecione uma imagem (JPG, PNG ou WEBP).'); return; }
    if (contentType === 'video' && !isVid) { setUploadErr('Selecione um vídeo (MP4, MOV ou WEBM).'); return; }
    if (!isImg && !isVid) { setUploadErr('Formato não suportado.'); return; }
    if (file.size > maxBytes) { setUploadErr(`Arquivo muito grande. Máximo: ${contentType === 'video' ? '250 MB' : '20 MB'}.`); return; }

    setUploading(true);
    setProgress(0);
    // Simula progresso visual enquanto o upload ocorre
    const ticker = setInterval(() => setProgress(p => p < 85 ? p + Math.random() * 12 : p), 300);
    try {
      const publicUrl = await uploadMedia(file);
      const mediaType = isImg ? 'image' : 'video';
      console.log("MEDIA TYPE:", mediaType);
      console.log("CALLING onSelect with URL:", publicUrl);
      clearInterval(ticker);
      setProgress(100);
      // onSelect e setUploading no mesmo tick — evita estado intermediário
      // onde uploading=false mas mediaURL ainda não chegou como prop
      setTimeout(() => {
        onSelect(publicUrl, mediaType, file.name, file.size);
        setUploading(false);
        setProgress(0);
      }, 350);
    } catch (err) {
      clearInterval(ticker);
      setUploading(false);
      setProgress(0);
      setUploadErr(`Erro no upload: ${err.message}`);
    }
  }, [contentType, maxBytes, onSelect]);

  const onDrop      = useCallback((e) => { e.preventDefault(); setDragging(false); processFile(e.dataTransfer.files[0]); }, [processFile]);
  const onDragOver  = useCallback((e) => { e.preventDefault(); setDragging(true); }, []);
  const onDragLeave = useCallback(() => setDragging(false), []);
  const onFileChange = useCallback((e) => { processFile(e.target.files[0]); e.target.value = ''; }, [processFile]);

  if (uploading) {
    return (
      <div style={{border:'2px solid #DFF5E8',borderRadius:12,padding:'24px 16px',background:'#f0fdf4',textAlign:'center'}}>
        <div style={{marginBottom:10}}>
          <div style={{width:36,height:36,borderRadius:'50%',border:'3px solid #DFF5E8',borderTopColor:'#1E8549',animation:'spin 0.8s linear infinite',margin:'0 auto'}} />
        </div>
        <p style={{fontSize:13,fontWeight:600,color:'#1E8549',margin:'0 0 8px'}}>Enviando arquivo…</p>
        <div style={{background:'#DFF5E8',borderRadius:99,height:6,overflow:'hidden'}}>
          <div style={{background:'#1E8549',height:'100%',borderRadius:99,width:`${progress}%`,transition:'width 0.3s ease'}} />
        </div>
        <p style={{fontSize:11,color:'#6b7280',marginTop:6}}>{Math.round(progress)}%</p>
      </div>
    );
  }

  if (mediaURL) {
    return (
      <div style={{position:'relative',borderRadius:12,overflow:'hidden',background:'#f3f4f6'}}>
        {contentType === 'video'
          ? <video src={mediaURL} className="media-preview-video" controls preload="metadata" />
          : <img src={mediaURL} className="media-preview-img" alt="preview" onError={e=>{e.target.style.display='none'}} />
        }
        <div style={{position:'absolute',top:8,right:8,display:'flex',gap:6}}>
          <button
            type="button"
            onClick={()=>{ setUploadErr(''); fileRef.current?.click(); }}
            style={{background:'rgba(255,255,255,0.92)',border:'1px solid #e5e7eb',borderRadius:8,padding:'4px 10px',fontSize:11,fontWeight:600,color:'#374151',cursor:'pointer'}}
          >Trocar</button>
          <button
            type="button"
            onClick={onRemove}
            style={{background:'rgba(239,68,68,0.9)',border:'none',borderRadius:8,padding:'4px 10px',fontSize:11,fontWeight:600,color:'#fff',cursor:'pointer'}}
          >Remover</button>
        </div>
        <input ref={fileRef} type="file" accept={acceptStr} style={{display:'none'}} onChange={onFileChange} />
      </div>
    );
  }

  return (
    <div>
      <div
        className={`upload-zone${dragging?' drag-over':''}`}
        onDrop={onDrop} onDragOver={onDragOver} onDragLeave={onDragLeave}
        onClick={()=>{ setUploadErr(''); fileRef.current?.click(); }}
      >
        <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:10}}>
          <div style={{width:44,height:44,borderRadius:12,background:'#DFF5E8',display:'flex',alignItems:'center',justifyContent:'center'}}>
            <Ic n={contentType === 'video' ? 'video' : 'image'} size={22} color="#1E8549" />
          </div>
          <div>
            <p style={{fontSize:13,fontWeight:600,color:'#374151',margin:0}}>{uploadLabel}</p>
            <p style={{fontSize:11,color:'#9ca3af',marginTop:4}}>{helpText}</p>
          </div>
        </div>
        <input ref={fileRef} type="file" accept={acceptStr} style={{display:'none'}} onChange={onFileChange} />
      </div>
      {uploadErr && (
        <div style={{display:'flex',alignItems:'center',gap:8,marginTop:8,padding:'8px 12px',borderRadius:10,background:'#fef2f2',border:'1px solid #fecaca'}}>
          <Ic n="alert" size={14} color="#ef4444" />
          <span style={{fontSize:12,color:'#dc2626',fontWeight:500}}>{uploadErr}</span>
        </div>
      )}
    </div>
  );
});

// ─── CoverUpload — upload de capa para Artigo/Newsletter ─────────────────────
const CoverUpload = memo(({ coverUrl, onSelect, onRemove }) => {
  const fileRef  = useRef(null);
  const [dragging,  setDragging]  = useState(false);
  const [uploading, setUploading] = useState(false);
  const [progress,  setProgress]  = useState(0);
  const [uploadErr, setUploadErr] = useState('');

  const processFile = useCallback(async (file) => {
    if (!file) return;
    setUploadErr('');
    if (!file.type.startsWith('image/')) { setUploadErr('Selecione uma imagem (JPG, PNG ou WEBP).'); return; }
    if (file.size > 20 * 1024 * 1024) { setUploadErr('Imagem muito grande. Máximo: 20 MB.'); return; }
    setUploading(true); setProgress(0);
    const ticker = setInterval(() => setProgress(p => p < 85 ? p + Math.random() * 14 : p), 280);
    try {
      const url = await uploadMedia(file);
      clearInterval(ticker); setProgress(100);
      setTimeout(() => { setUploading(false); setProgress(0); }, 400);
      onSelect(url, file.name, file.size);
    } catch (err) {
      clearInterval(ticker); setUploading(false); setProgress(0);
      setUploadErr(`Erro no upload: ${err.message}`);
    }
  }, [onSelect]);

  const onDrop      = useCallback((e) => { e.preventDefault(); setDragging(false); processFile(e.dataTransfer.files[0]); }, [processFile]);
  const onDragOver  = useCallback((e) => { e.preventDefault(); setDragging(true); }, []);
  const onDragLeave = useCallback(() => setDragging(false), []);
  const onFileChange = useCallback((e) => { processFile(e.target.files[0]); e.target.value = ''; }, [processFile]);

  if (uploading) return (
    <div style={{border:'2px solid #DFF5E8',borderRadius:12,padding:'20px 16px',background:'#f0fdf4',textAlign:'center'}}>
      <div style={{width:32,height:32,borderRadius:'50%',border:'3px solid #DFF5E8',borderTopColor:'#1E8549',animation:'spin 0.8s linear infinite',margin:'0 auto 8px'}} />
      <p style={{fontSize:12,fontWeight:600,color:'#1E8549',margin:'0 0 6px'}}>Enviando capa…</p>
      <div style={{background:'#DFF5E8',borderRadius:99,height:5,overflow:'hidden'}}>
        <div style={{background:'#1E8549',height:'100%',borderRadius:99,width:`${progress}%`,transition:'width 0.3s ease'}} />
      </div>
    </div>
  );

  if (coverUrl) return (
    <div style={{position:'relative',borderRadius:12,overflow:'hidden',background:'#f3f4f6'}}>
      <img src={coverUrl} alt="capa" style={{width:'100%',maxHeight:180,objectFit:'cover',display:'block'}} onError={e=>{e.target.style.display='none'}} />
      <div style={{position:'absolute',top:8,right:8,display:'flex',gap:6}}>
        <button type="button" onClick={()=>{ setUploadErr(''); fileRef.current?.click(); }}
          style={{background:'rgba(255,255,255,0.92)',border:'1px solid #e5e7eb',borderRadius:8,padding:'4px 10px',fontSize:11,fontWeight:600,color:'#374151',cursor:'pointer'}}>Trocar</button>
        <button type="button" onClick={onRemove}
          style={{background:'rgba(239,68,68,0.9)',border:'none',borderRadius:8,padding:'4px 10px',fontSize:11,fontWeight:600,color:'#fff',cursor:'pointer'}}>Remover</button>
      </div>
      <input ref={fileRef} type="file" accept="image/jpeg,image/png,image/webp" style={{display:'none'}} onChange={onFileChange} />
    </div>
  );

  return (
    <div>
      <div className={`upload-zone${dragging?' drag-over':''}`}
        onDrop={onDrop} onDragOver={onDragOver} onDragLeave={onDragLeave}
        onClick={()=>{ setUploadErr(''); fileRef.current?.click(); }}>
        <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:10}}>
          <div style={{width:40,height:40,borderRadius:12,background:'#DFF5E8',display:'flex',alignItems:'center',justifyContent:'center'}}>
            <Ic n="image" size={20} color="#1E8549" />
          </div>
          <div>
            <p style={{fontSize:13,fontWeight:600,color:'#374151',margin:0}}>Clique para selecionar a capa ou arraste aqui</p>
            <p style={{fontSize:11,color:'#9ca3af',marginTop:4}}>JPG, PNG ou WEBP — máx. 20 MB</p>
          </div>
        </div>
        <input ref={fileRef} type="file" accept="image/jpeg,image/png,image/webp" style={{display:'none'}} onChange={onFileChange} />
      </div>
      {uploadErr && (
        <div style={{display:'flex',alignItems:'center',gap:8,marginTop:8,padding:'8px 12px',borderRadius:10,background:'#fef2f2',border:'1px solid #fecaca'}}>
          <Ic n="alert" size={14} color="#ef4444" />
          <span style={{fontSize:12,color:'#dc2626',fontWeight:500}}>{uploadErr}</span>
        </div>
      )}
    </div>
  );
});

// ─── Post Modal (Add/Edit) ─────────────────────────────────────────────────
// PERFORMANCE: campos de texto usam refs (uncontrolled) → zero re-renders ao digitar.
// Apenas o estado "meta" (selects, datas, tags, mídia) usa useState.
const EMPTY_META = {
  formato:'Post', status:'Rascunho', prioridade:'Média',
  objetivo:'Employer Branding', engajamento:'Médio', dataPublicacao:'',
  tags:[], mediaURL:'', mediaType:'image', fileName:'', fileSize:0,
};

const PostModal = ({ post, onClose, onSave, currentUser }) => {
  // Estado para campos NÃO-TEXTO (selects, date, tags, mídia) — re-renders OK aqui
  const [meta, setMeta] = useState(() => post ? {
    formato: post.formato || EMPTY_META.formato,
    status: post.status || EMPTY_META.status,
    prioridade: post.prioridade || EMPTY_META.prioridade,
    objetivo: post.objetivo || EMPTY_META.objetivo,
    engajamento: post.engajamento || EMPTY_META.engajamento,
    dataPublicacao: post.dataPublicacao || '',
    tags: post.tags || [],
    mediaURL: post.mediaURL || '',
    mediaType: post.mediaType || 'image',
    fileName: post.fileName || '',
    fileSize: post.fileSize || 0,
  } : {...EMPTY_META});

  // Refs para campos de TEXTO — sem re-renders ao digitar
  const tituloRef             = useRef(null);
  const legendaRef            = useRef(null);
  const ctaRef                = useRef(null);
  const obsRef                = useRef(null);
  const textContentRef        = useRef(null);
  const contentTitleRef       = useRef(null);
  const contentDescriptionRef = useRef(null);
  const fullTextRef           = useRef(null);
  const newsletterNameRef     = useRef(null);

  // Estado da capa (Artigo / Newsletter) — re-render OK pois não é digitação
  const [coverMeta, setCoverMeta] = useState({
    coverUrl: post?.coverUrl || '',
    coverFileName: post?.coverFileName || '',
    coverFileSize: post?.coverFileSize || 0,
  });
  const onCoverSelect = useCallback((url, name, size) => setCoverMeta({ coverUrl: url, coverFileName: name, coverFileSize: size }), []);
  const onCoverRemove = useCallback(() => setCoverMeta({ coverUrl: '', coverFileName: '', coverFileSize: 0 }), []);

  const [tagInput, setTagInput] = useState('');

  const setM = useCallback((k, v) => setMeta(m => ({...m, [k]: v})), []);

  const onMediaSelect = useCallback((url, type, fileName, fileSize) => {
    setMeta(m => ({...m, mediaURL: url, mediaType: type, fileName: fileName || '', fileSize: fileSize || 0}));
  }, []);

  // Remove só a mídia, mantém o tipo de conteúdo escolhido
  const onMediaRemove = useCallback(() => {
    setMeta(m => ({...m, mediaURL: '', fileName: '', fileSize: 0}));
  }, []);

  // Ao trocar o tipo de conteúdo, limpa mídia existente (tipo incompatível)
  const handleContentType = useCallback((type) => {
    setMeta(m => ({...m, mediaType: type, mediaURL: '', fileName: '', fileSize: 0}));
  }, []);

  const addTag = useCallback(() => {
    const t = tagInput.trim().replace(/^#*/, '#');
    if (t.length > 1 && !meta.tags.includes(t)) setM('tags', [...meta.tags, t]);
    setTagInput('');
  }, [tagInput, meta.tags, setM]);

  const removeTag = useCallback((t) => setM('tags', meta.tags.filter(x => x !== t)), [meta.tags, setM]);

  const save = useCallback(() => {
    const titulo = tituloRef.current?.value?.trim() || '';
    if (!titulo) { alert('Preencha o título interno.'); tituloRef.current?.focus(); return; }
    const isArticle    = meta.formato === 'Artigo';
    const isNewsletter = meta.formato === 'Newsletter';
    const built = {
      titulo,
      legenda:     legendaRef.current?.value || '',
      linkCTA:     ctaRef.current?.value     || '',
      observacoes: obsRef.current?.value     || '',
      textContent: meta.formato === 'Post' ? (textContentRef.current?.value || '') : '',
      ...(isArticle ? {
        contentTitle:       contentTitleRef.current?.value       || '',
        contentDescription: contentDescriptionRef.current?.value || '',
        fullText:           fullTextRef.current?.value           || '',
        ...coverMeta,
      } : {}),
      ...(isNewsletter ? {
        newsletterName:     newsletterNameRef.current?.value     || '',
        contentTitle:       contentTitleRef.current?.value       || '',
        contentDescription: contentDescriptionRef.current?.value || '',
        ...coverMeta,
      } : {}),
      ...meta,
    };
    const autor   = currentUser || '—';
    const baseHist = [...(post?.historico || [])];

    if (post?.id) {
      // Detecta mudanças de mídia/capa para entradas específicas no histórico
      const prevMedia = post.mediaURL  || '';
      const newMedia  = built.mediaURL || '';
      const prevCover = post.coverUrl  || '';
      const newCover  = built.coverUrl || '';

      if (newMedia && newMedia !== prevMedia) {
        const tipo = built.mediaType === 'video' ? 'um vídeo' : 'uma imagem';
        baseHist.push(makeHistEntry(`${autor} adicionou ${tipo}`, autor));
      } else if (!newMedia && prevMedia) {
        baseHist.push(makeHistEntry(`${autor} removeu a mídia`, autor));
      }

      if (newCover && newCover !== prevCover) {
        baseHist.push(makeHistEntry(`${autor} trocou a capa`, autor));
      }

      baseHist.push(makeHistEntry(`${autor} editou o post`, autor));
    } else {
      if (built.mediaURL) {
        const tipo = built.mediaType === 'video' ? 'um vídeo' : 'uma imagem';
        baseHist.push(makeHistEntry(`${autor} adicionou ${tipo}`, autor));
      }
      if (built.coverUrl) {
        baseHist.push(makeHistEntry(`${autor} adicionou a capa`, autor));
      }
      baseHist.push(makeHistEntry(`${autor} criou o post`, autor));
    }

    const finalPost = post?.id
      ? { ...post, ...built, historico: baseHist }
      : { ...built, id: Date.now(), comments: [], feedbackLideranca: [], historico: baseHist };

    onSave(finalPost);
    onClose();
  }, [meta, coverMeta, post, onSave, onClose, currentUser]);

  useEffect(() => {
    document.body.classList.add('modal-open');
    return () => document.body.classList.remove('modal-open');
  }, []);

  const ic = "border border-gray-200 rounded-xl px-3 py-2.5 text-sm bg-white w-full";

  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center p-4" style={{background:'rgba(10,30,20,0.72)'}} onClick={onClose}>
      <div className="bg-white rounded-2xl shadow-2xl w-full max-w-2xl max-h-[92vh] flex flex-col slide-modal" style={{willChange:'transform'}} onClick={e=>e.stopPropagation()}>
        <div className="flex items-center justify-between px-6 py-4 border-b border-gray-100 flex-shrink-0">
          <div>
            <h2 className="font-bold text-base" style={{fontWeight:700,color:'#111'}}>{post ? 'Editar Post' : 'Novo Post'}</h2>
            <p className="text-xs text-gray-400 mt-0.5">Preencha os dados do conteúdo LinkedIn</p>
          </div>
          <button onClick={onClose} className="w-8 h-8 flex items-center justify-center rounded-full hover:bg-gray-100 transition-colors">
            <Ic n="x" size={15} />
          </button>
        </div>

        <div className="overflow-y-auto scrollbar-hide p-6 flex flex-col gap-4 flex-1">

          {/* TÍTULO */}
          <ModalField label="Título interno *">
            <input ref={tituloRef} className={ic} defaultValue={post?.titulo||''} placeholder="Ex: Post de cultura — maio 2026" style={{color:'#111'}} />
          </ModalField>

          {/* TIPO DE CONTEÚDO */}
          <ModalField label="Tipo de conteúdo">
            <div style={{display:'flex',gap:4,background:'#f3f4f6',padding:4,borderRadius:12}}>
              {[
                {val:'Post',       icon:'msg',  lbl:'Post'},
                {val:'Artigo',     icon:'file', lbl:'Artigo'},
                {val:'Newsletter', icon:'send', lbl:'Newsletter'},
              ].map(({val, icon, lbl}) => (
                <button key={val} type="button"
                  onClick={()=>setM('formato', val)}
                  className={`view-btn flex-1 ${meta.formato===val?'active':''}`}
                  style={{display:'flex',alignItems:'center',justifyContent:'center',gap:6}}>
                  <Ic n={icon} size={13} color={meta.formato===val?'#fff':'#6b7280'} />
                  {lbl}
                </button>
              ))}
            </div>
          </ModalField>

          {/* LEGENDA */}
          <ModalField label="Texto da legenda">
            <textarea ref={legendaRef} className={ic} rows={5} defaultValue={post?.legenda||''} placeholder="Texto que acompanha o post no LinkedIn..." style={{color:'#111',resize:'vertical'}} />
          </ModalField>

          {/* SELECTS */}
          <div className="grid grid-cols-2 gap-4">
            <ModalField label="Status">
              <select className={ic} value={meta.status} onChange={e=>setM('status',e.target.value)} style={{color:'#111'}}>
                {STATUS_KEYS.map(s=><option key={s}>{s}</option>)}
              </select>
            </ModalField>
            <ModalField label="Prioridade">
              <select className={ic} value={meta.prioridade} onChange={e=>setM('prioridade',e.target.value)} style={{color:'#111'}}>
                {['Alta','Média','Baixa'].map(p=><option key={p}>{p}</option>)}
              </select>
            </ModalField>
          </div>

          <div className="grid grid-cols-2 gap-4">
            <ModalField label="Objetivo">
              <select className={ic} value={meta.objetivo} onChange={e=>setM('objetivo',e.target.value)} style={{color:'#111'}}>
                {OBJETIVOS.map(o=><option key={o}>{o}</option>)}
              </select>
            </ModalField>
            <ModalField label="Potencial de engajamento">

              <div style={{display:'flex',flexDirection:'column',gap:6}}>

          {meta.formato === 'Newsletter' && (
            <div style={{display:'flex',flexDirection:'column',gap:12,padding:16,borderRadius:16,border:'1px solid #e9d5ff',background:'#fdf4ff'}}>
              <div style={{display:'flex',alignItems:'center',gap:8}}>
                <div style={{width:28,height:28,borderRadius:8,background:'#9333ea',display:'flex',alignItems:'center',justifyContent:'center'}}>
                  <Ic n="send" size={14} color="#fff" />

                  <p style={{margin:0,fontSize:13,fontWeight:700,color:'#581c87'}}>Conteúdo da Newsletter</p>

                </div>
              </div>
              <div style={{display:'flex',flexDirection:'column',gap:6}}>
                <label style={{fontSize:11,fontWeight:600,color:'#374151',textTransform:'uppercase',letterSpacing:'0.06em'}}>Nome da newsletter</label>
                <input ref={newsletterNameRef} defaultValue={post?.newsletterName||''} placeholder="Ex: allu Insights · People &amp; Tech"
                  style={{border:'1px solid #e9d5ff',borderRadius:10,padding:'10px 12px',fontSize:13,color:'#111',background:'#fff',outline:'none',width:'100%',fontFamily:'inherit'}}
                  onFocus={e=>e.target.style.borderColor='#9333ea'} onBlur={e=>e.target.style.borderColor='#e9d5ff'} />
              </div>
              <div style={{display:'flex',flexDirection:'column',gap:6}}>
                <label style={{fontSize:11,fontWeight:600,color:'#374151',textTransform:'uppercase',letterSpacing:'0.06em'}}>Imagem de capa</label>
                <CoverUpload coverUrl={coverMeta.coverUrl} onSelect={onCoverSelect} onRemove={onCoverRemove} />
              </div>
              <div style={{display:'flex',flexDirection:'column',gap:6}}>

                <input ref={contentTitleRef} defaultValue={post?.contentTitle||''} placeholder="Ex: Como construir marca empregadora em 2026"

                  onFocus={e=>e.target.style.borderColor='#9333ea'} onBlur={e=>e.target.style.borderColor='#e9d5ff'} />
              </div>
              <div style={{display:'flex',flexDirection:'column',gap:6}}>
                <label style={{fontSize:11,fontWeight:600,color:'#374151',textTransform:'uppercase',letterSpacing:'0.06em'}}>Descrição da edição</label>
                <textarea ref={contentDescriptionRef} defaultValue={post?.contentDescription||''} rows={3}
                  placeholder="Resumo do que o leitor vai encontrar nessa edição..."

          {/* TAGS */}
          <ModalField label="Tags">
            <div className="flex gap-2">

            {meta.tags.length > 0 && (
              <div className="flex flex-wrap gap-1.5 mt-2">
                {meta.tags.map(t=>(
                  <span key={t} className="tag-pill active">
                    {t}
                    <button onClick={()=>removeTag(t)} className="ml-1.5 opacity-60 hover:opacity-100"><Ic n="x" size={9} color="#1E8549" /></button>

          {/* MAIS TEXTO — uncontrolled */}

            <input ref={ctaRef} className={ic} defaultValue={post?.linkCTA||''} placeholder="https://allu.com.br/..." style={{color:'#111'}} />
          </ModalField>

          <ModalField label="Observações internas">
            <textarea ref={obsRef} className={ic} rows={3} defaultValue={post?.observacoes||''} placeholder="Notas para o time, pendências, instruções de design..." style={{color:'#111',resize:'vertical'}} />
          </ModalField>

          <div className="flex gap-3 pt-1">
            <button onClick={onClose} className="flex-1 py-2.5 border border-gray-200 rounded-xl text-sm font-semibold text-gray-600 hover:bg-gray-50 transition-colors">Cancelar</button>

        </div>

};

// ─── Confirm Modal ────────────────────────────────────────────────────────────
const ConfirmModal = ({ message, onConfirm, onClose, danger=false }) => (
  <div className="fixed inset-0 z-50 flex items-center justify-center p-4" style={{background:'rgba(10,30,20,0.72)'}} onClick={onClose}>
    <div className="bg-white rounded-2xl shadow-2xl w-full max-w-sm p-6 slide-modal" style={{willChange:'transform'}} onClick={e=>e.stopPropagation()}>
      <p className="text-sm text-gray-700 leading-relaxed">{message}</p>
      <div className="flex gap-3 mt-5">
        <button onClick={onClose} className="flex-1 py-2.5 border border-gray-200 rounded-xl text-sm font-semibold text-gray-600 hover:bg-gray-50 transition-colors">Cancelar</button>
        <button onClick={()=>{onConfirm();onClose();}} className="flex-1 py-2.5 rounded-xl text-sm font-bold text-white btn" style={{background: danger ? '#ef4444' : '#1E8549'}}>
          Confirmar
        </button>
      </div>
    </div>
  </div>
);

// ─── Comments Section ─────────────────────────────────────────────────────────
const CommentsSection = ({ post, onAddComment, onAddLeadFeedback, currentUser }) => {
  const [text,     setText]     = useState('');
  const [leadText, setLeadText] = useState('');
  const [tab,      setTab]      = useState('comments');

  const sendComment = () => {
    if (!text.trim()) return;
    onAddComment(post.id, { id: Date.now(), autor: currentUser || 'Anônimo', texto: text.trim(), timestamp: nowStr(), iso_timestamp: nowISO() });
    setText('');
  };
  const sendLead = () => {
    if (!leadText.trim()) return;
    onAddLeadFeedback(post.id, { id: Date.now(), autor: currentUser || 'Liderança', texto: leadText.trim(), timestamp: nowStr(), iso_timestamp: nowISO() });
    setLeadText('');
  };

  return (
    <div className="border-t border-gray-100 pt-3 mt-3 fade-in">
      <div className="flex gap-1 mb-3 bg-gray-100 rounded-xl p-1 w-fit">
        <button onClick={()=>setTab('comments')} className={`view-btn flex items-center gap-1.5 ${tab==='comments'?'active':''}`}>
          <Ic n="msg" size={12} color={tab==='comments'?'#fff':'#6b7280'} />
          Comentários {post.comments.length > 0 && `(${post.comments.length})`}
        </button>
        <button onClick={()=>setTab('lead')} className={`view-btn flex items-center gap-1.5 ${tab==='lead'?'active':''}`}>
          <Ic n="crown" size={12} color={tab==='lead'?'#fff':'#6b7280'} />
          Liderança {post.feedbackLideranca.length > 0 && `(${post.feedbackLideranca.length})`}
        </button>
      </div>

      {tab === 'comments' && (
        <>
          {post.comments.length === 0 && <p className="text-xs text-gray-400 italic mb-3">Nenhum comentário ainda.</p>}
          <div className="space-y-2 mb-3">
            {post.comments.map(c=>(
              <div key={c.id} className="rounded-xl p-3" style={{background:'#F5F5F5'}}>
                <div className="flex items-center gap-2 mb-1.5">
                  <div className="w-5 h-5 rounded-full flex items-center justify-center text-white text-xs font-bold flex-shrink-0" style={{background:'#1E8549',fontSize:9}}>
                    {(c.autor||'?')[0].toUpperCase()}
                  </div>
                  <span className="text-xs font-semibold" style={{color:'#0F3D2E'}}>{c.autor}</span>
                  <span className="text-xs text-gray-400 ml-auto">{c.iso_timestamp ? fmtISO(c.iso_timestamp) : c.timestamp}</span>
                </div>
                <p className="text-xs text-gray-700 leading-relaxed">{c.texto}</p>
              </div>
            ))}
          </div>
          {currentUser && <div className="text-xs text-gray-400 mb-1.5 flex items-center gap-1.5"><div className="w-4 h-4 rounded-full flex items-center justify-center text-white font-bold flex-shrink-0" style={{background:'#1E8549',fontSize:8}}>{currentUser[0].toUpperCase()}</div> Comentando como <strong style={{color:'#0F3D2E'}}>{currentUser}</strong></div>}
          <div className="flex gap-2">
            <input className="flex-1 border border-gray-200 rounded-lg px-3 py-2 text-xs bg-white" placeholder="Adicionar comentário..." value={text} onChange={e=>setText(e.target.value)} onKeyDown={e=>e.key==='Enter'&&sendComment()} style={{color:'#111'}} />
            <button onClick={sendComment} className="px-3 py-2 rounded-lg text-white flex-shrink-0 btn" style={{background:'#1E8549'}}><Ic n="send" size={12} color="#fff" /></button>
          </div>
        </>
      )}

      {tab === 'lead' && (
        <>
          {post.feedbackLideranca.length === 0 && <p className="text-xs text-gray-400 italic mb-3">Nenhum feedback da liderança ainda.</p>}
          <div className="space-y-2 mb-3">
            {post.feedbackLideranca.map(c=>(
              <div key={c.id} className="rounded-xl p-3 border" style={{background:'#FFFBEB',borderColor:'#fde68a'}}>
                <div className="flex items-center gap-2 mb-1.5">
                  <Ic n="crown" size={11} color="#ca8a04" />
                  <span className="text-xs font-semibold" style={{color:'#92400e'}}>{c.autor}</span>
                  <span className="text-xs text-gray-400 ml-auto">{c.iso_timestamp ? fmtISO(c.iso_timestamp) : c.timestamp}</span>
                </div>
                <p className="text-xs leading-relaxed" style={{color:'#78350f'}}>{c.texto}</p>
              </div>
            ))}
          </div>
          {currentUser && <div className="text-xs text-gray-400 mb-1.5 flex items-center gap-1.5"><Ic n="crown" size={11} color="#ca8a04" /> Feedback como <strong style={{color:'#92400e'}}>{currentUser}</strong></div>}
          <div className="flex gap-2">
            <input className="flex-1 border border-gray-200 rounded-lg px-3 py-2 text-xs bg-white" placeholder="Feedback da liderança..." value={leadText} onChange={e=>setLeadText(e.target.value)} onKeyDown={e=>e.key==='Enter'&&sendLead()} style={{color:'#111'}} />
            <button onClick={sendLead} className="px-3 py-2 rounded-lg flex-shrink-0 btn text-white" style={{background:'#ca8a04'}}><Ic n="send" size={12} color="#fff" /></button>
          </div>
        </>
      )}
    </div>
  );
};

// ─── History Section ──────────────────────────────────────────────────────────
const HistorySection = ({ historico }) => {
  const sorted = [...(historico||[])].reverse();
  return (
    <div className="border-t border-gray-100 pt-3 mt-3 fade-in">
      <p className="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-3 flex items-center gap-1.5">
        <Ic n="history" size={12} /> Histórico
      </p>
      {sorted.length === 0 && <p className="text-xs text-gray-400 italic">Nenhum registro ainda.</p>}
      <div className="space-y-3">
        {sorted.map((h, i) => {
          const name    = h.autor || '—';
          const initial = name[0]?.toUpperCase() || '?';
          const ts      = h.iso_timestamp ? fmtISO(h.iso_timestamp) : (h.timestamp || '');
          const hasDiff = h.de !== undefined || h.para !== undefined;
          return (
            <div key={i} className="flex items-start gap-2.5">
              <div className="w-6 h-6 rounded-full flex items-center justify-center text-white font-bold flex-shrink-0 mt-0.5" style={{background:'#1E8549',fontSize:10}}>
                {initial}
              </div>
              <div className="flex-1 min-w-0">
                <p className="text-xs text-gray-700 font-medium leading-snug">{h.acao}</p>
                {ts && <p className="text-xs text-gray-400 mt-0.5">{ts}</p>}
                {hasDiff && (
                  <div className="mt-1.5 space-y-1">
                    {h.de  !== undefined && <div className="text-xs rounded-lg px-2 py-1.5 leading-relaxed" style={{background:'#fef2f2',color:'#991b1b'}}>De: <em>"{String(h.de).slice(0,120)}{String(h.de).length>120?'…':''}"</em></div>}
                    {h.para !== undefined && <div className="text-xs rounded-lg px-2 py-1.5 leading-relaxed" style={{background:'#f0fdf4',color:'#166534'}}>Para: <em>"{String(h.para).slice(0,120)}{String(h.para).length>120?'…':''}"</em></div>}
                  </div>
                )}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
};

// ─── Post Card ────────────────────────────────────────────────────────────────
const PostCard = memo(({ post, onView, onEdit, onChangeStatus, onDelete, onAddComment, onAddLeadFeedback, activeTag, onTagClick, currentUser }) => {
  const [openSection, setOpenSection] = useState(null);
  const toggle = (s) => setOpenSection(v => v === s ? null : s);
  const sc = STATUS_CONFIG[post.status] || STATUS_CONFIG['Rascunho'];
  const totalFeedback = post.comments.length + post.feedbackLideranca.length;

  return (
    <div className="bg-white rounded-2xl border border-gray-100 overflow-hidden card-hover" style={{boxShadow:'0 1px 6px rgba(0,0,0,0.06)'}}>
      {/* Top accent */}
      <div style={{height:3,background: `linear-gradient(90deg, ${sc.bar}, ${sc.bar}88)`}} />

      <div className="p-5">
        {/* Title row */}
        <div className="flex items-start justify-between gap-2 mb-3">
          <div className="flex-1 min-w-0">
            <h3 className="text-sm font-bold leading-snug mb-2 line-clamp-2" style={{color:'#111111',fontWeight:700}}>{post.titulo}</h3>
            <div className="flex flex-wrap items-center gap-1.5">
              <FormatBadge formato={post.formato} />
              <StatusBadge status={post.status} />
            </div>
          </div>
          {(post.formato === 'Artigo' || post.formato === 'Newsletter') ? (
            <div className="w-14 h-14 rounded-xl overflow-hidden flex-shrink-0" style={{background:'#0F3D2E',position:'relative'}}>
              {(post.coverUrl || post.mediaURL) ? (
                <img
                  src={post.coverUrl || post.mediaURL}
                  alt=""
                  className="w-full h-full object-cover"
                  onError={e=>{e.target.style.display='none'}}
                />
              ) : (
                <div className="w-full h-full flex items-center justify-center"><Ic n="file" size={20} color="rgba(255,255,255,0.7)" /></div>
              )}
            </div>
          ) : post.mediaURL ? (
            <div className="w-14 h-14 rounded-xl overflow-hidden flex-shrink-0 relative" style={{background:'#f3f4f6'}}>
              {post.mediaType === 'video'
                ? <div className="w-full h-full flex items-center justify-center" style={{background:'#1f2937'}}>
                    <Ic n="play-circle" size={26} color="#fff" />
                  </div>
                : <img src={post.mediaURL} alt="" className="w-full h-full object-cover" onError={e=>{e.target.style.opacity='0.3'; console.warn("PostCard img failed:", post.mediaURL);}} />
              }
            </div>
          ) : post.mediaType === 'text' ? (
            <div className="w-14 h-14 rounded-xl flex-shrink-0 flex flex-col items-center justify-center gap-0.5" style={{background:'#f0fdf4',border:'1px solid #DFF5E8',flexShrink:0}}>
              <Ic n="file" size={16} color="#1E8549" />
              <span style={{fontSize:9,color:'#1E8549',fontWeight:700,letterSpacing:'0.02em'}}>TEXTO</span>
            </div>
          ) : null}
        </div>

        {/* Priority + Engagement row */}
        <div className="flex flex-wrap items-center gap-1.5 mb-3">
          <PriorityBadge priority={post.prioridade} />
          <EngagementBadge engajamento={post.engajamento} />
          {post.objetivo && <ObjetivoBadge objetivo={post.objetivo} />}
        </div>

        {/* Caption preview */}
        <p className="text-xs text-gray-500 leading-relaxed line-clamp-2 mb-1">{post.legenda}</p>
        {(post.formato === 'Artigo' || post.formato === 'Newsletter') && post.contentTitle && (
          <p className="text-xs font-semibold mb-0.5" style={{color:'#0F3D2E',display:'-webkit-box',WebkitLineClamp:1,WebkitBoxOrient:'vertical',overflow:'hidden'}}>
            {post.contentTitle}
          </p>
        )}
        {(post.formato === 'Artigo' || post.formato === 'Newsletter') && post.contentDescription && (
          <p className="text-xs leading-relaxed mb-3" style={{color:'#9ca3af',display:'-webkit-box',WebkitLineClamp:2,WebkitBoxOrient:'vertical',overflow:'hidden'}}>
            {post.contentDescription}
          </p>
        )}
        {post.mediaType === 'text' && post.textContent && !(post.formato === 'Artigo' || post.formato === 'Newsletter') && (
          <p className="text-xs leading-relaxed mb-3" style={{color:'#9ca3af',fontStyle:'italic',display:'-webkit-box',WebkitLineClamp:2,WebkitBoxOrient:'vertical',overflow:'hidden'}}>
            {post.textContent.length > 120 ? post.textContent.slice(0, 120) + '…' : post.textContent}

        {post.tags && post.tags.length > 0 && (
          <div className="flex flex-wrap gap-1 mb-3">
            {post.tags.map(t => (
              <span key={t} onClick={()=>onTagClick(t)} className={`tag-pill ${activeTag===t?'active':''}`}>{t}</span>

        {/* Meta */}

});

// ─── Calendar View ────────────────────────────────────────────────────────────
const CalendarView = memo(({ posts }) => {
  const today = new Date();
  const [cur, setCur] = useState(new Date(today.getFullYear(), today.getMonth(), 1));

  const y = cur.getFullYear(), m = cur.getMonth();
  const monthLabel = cur.toLocaleString('pt-BR', {month:'long', year:'numeric'});
  const firstDOW = (new Date(y, m, 1).getDay() + 6) % 7; // Mon-start
  const daysInMonth = new Date(y, m+1, 0).getDate();

  const byDay = useMemo(() => {
    const map = {};
    posts.forEach(p => {
      if (!p.dataPublicacao) return;
      const [py, pm, pd] = p.dataPublicacao.split('-').map(Number);
      if (py === y && pm-1 === m) {
        if (!map[pd]) map[pd] = [];
        map[pd].push(p);
      }
    });
    return map;
  }, [posts, y, m]);

  const cells = [];
  for (let i = 0; i < firstDOW; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) cells.push(d);

  const isToday = (d) => d === today.getDate() && m === today.getMonth() && y === today.getFullYear();

  return (
    <div className="bg-white rounded-2xl border border-gray-100 p-5 fade-in" style={{boxShadow:'0 1px 6px rgba(0,0,0,0.06)'}}>
      <div className="flex items-center justify-between mb-5">
        <button onClick={()=>setCur(new Date(y, m-1, 1))} className="w-8 h-8 flex items-center justify-center rounded-xl hover:bg-gray-100 transition-colors">
          <Ic n="chevron-left" size={16} />
        </button>
        <h3 className="font-bold text-sm capitalize" style={{fontWeight:700}}>{monthLabel}</h3>
        <button onClick={()=>setCur(new Date(y, m+1, 1))} className="w-8 h-8 flex items-center justify-center rounded-xl hover:bg-gray-100 transition-colors">
          <Ic n="chevron-right" size={16} />
        </button>
      </div>

      <div className="grid grid-cols-7 gap-1 mb-2">
        {['Seg','Ter','Qua','Qui','Sex','Sáb','Dom'].map(d=>(
          <div key={d} className="text-center text-xs font-semibold text-gray-400 py-1">{d}</div>
        ))}
      </div>

      <div className="grid grid-cols-7 gap-1">
        {cells.map((day, i) => (
          <div key={i} className={`cal-day ${day && isToday(day) ? 'today' : ''}`}>
            {day && (
              <>
                <div className="text-xs font-semibold mb-1" style={{color: isToday(day) ? '#1E8549' : '#9ca3af'}}>{day}</div>
                <div className="space-y-0.5 overflow-hidden">
                  {(byDay[day]||[]).slice(0, 3).map(p => {
                    const sc = STATUS_CONFIG[p.status] || STATUS_CONFIG['Rascunho'];
                    return (
                      <div key={p.id} title={p.titulo} className="rounded px-1 py-0.5 truncate" style={{background: sc.bar + '20', color: sc.bar, fontSize: 10, fontWeight: 500}}>
                        {p.titulo.length > 12 ? p.titulo.slice(0,12)+'…' : p.titulo}
                      </div>
                    );
                  })}
                  {(byDay[day]||[]).length > 3 && (
                    <div className="text-xs text-gray-400" style={{fontSize:9}}>+{(byDay[day].length-3)} mais</div>
                  )}
                </div>
              </>
            )}
          </div>
        ))}
      </div>

      {/* Legend */}
      <div className="flex flex-wrap gap-3 mt-4 pt-4 border-t border-gray-100">
        {Object.entries(STATUS_CONFIG).map(([s, cfg]) => (
          <div key={s} className="flex items-center gap-1.5 text-xs text-gray-500">
            <div className="w-2.5 h-2.5 rounded-full flex-shrink-0" style={{background: cfg.bar}} />
            {cfg.label}
          </div>
        ))}
      </div>
    </div>
  );
});

// ─── App ──────────────────────────────────────────────────────────────────────
const App = () => {
  const [posts, setPosts]           = useState([]);
  const [postsLoading, setPostsLoading] = useState(true);
  const [dbError, setDbError]       = useState('');
  const [viewPostId, setViewPostId] = useState(null);
  const [editPost, setEditPost]     = useState(null);
  const [showAdd, setShowAdd]       = useState(false);
  const [confirm, setConfirm]       = useState(null);
  const [viewMode, setViewMode]     = useState('list');
  const [activeTag, setActiveTag]   = useState('');
  const [filters, setFilters]       = useState({ status:'', formato:'', objetivo:'', data:'' });
  const [savedNotice, setSavedNotice] = useState(null);

  // ── Usuário identificado ──────────────────────────────────────────────────
  const [currentUser, setCurrentUser] = useState(() => {
    const u = localStorage.getItem('allu_user') || '';
    console.log('[allu] currentUser on init:', u || '(vazio)');
    return u;
  });
  const [showUserModal, setShowUserModal] = useState(() => {
    const hasUser = !!localStorage.getItem('allu_user');
    console.log('[allu] showUserModal:', !hasUser);
    return !hasUser;
  });
  const handleUserName = useCallback((name) => {
    console.log('[allu] handleUserName:', name);
    localStorage.setItem('allu_user', name);
    setCurrentUser(name);
    setShowUserModal(false);
  }, []);

  // viewPost derived — sempre em sincronia com o array posts
  const viewPost = useMemo(() => viewPostId ? (posts.find(p => p.id === viewPostId) || null) : null, [viewPostId, posts]);

  const loadPosts = useCallback(async () => {
    setPostsLoading(true);
    setDbError('');
    const { data, error } = await supabaseClient
      .from('posts')
      .select('*')
      .order('created_at', { ascending: false });
    if (error) {
      console.error('Erro ao carregar posts:', error);
      setDbError(error.message);
      setPostsLoading(false);
      return;
    }
    setPosts((data || []).map(dbToPost));
    setPostsLoading(false);
  }, []);

  useEffect(() => { loadPosts(); }, [loadPosts]);

  // KPIs
  const kpis = useMemo(() => ({
    total: posts.length,
    analise: posts.filter(p => p.status === 'Em análise').length,
    ajustes: posts.filter(p => p.status === 'Ajustes solicitados').length,
    aprovados: posts.filter(p => ['Aprovado','Pronto para postar'].includes(p.status)).length,
    publicados: posts.filter(p => p.status === 'Publicado').length,
  }), [posts]);

  // Filtered posts
  const filtered = useMemo(() => posts.filter(p => {
    if (filters.status && p.status !== filters.status) return false;
    if (filters.formato && p.formato !== filters.formato) return false;
    if (filters.objetivo && p.objetivo !== filters.objetivo) return false;
    if (filters.data && p.dataPublicacao !== filters.data) return false;
    if (activeTag && !(p.tags||[]).includes(activeTag)) return false;
    return true;
  }), [posts, filters, activeTag]);

  const allTags = useMemo(() => [...new Set(posts.flatMap(p => p.tags||[]))].sort(), [posts]);

  const setF = useCallback((k, v) => setFilters(f => ({...f, [k]: v})), []);
  const clearFilters = useCallback(() => { setFilters({status:'',formato:'',objetivo:'',data:''}); setActiveTag(''); }, []);
  const hasFilters = Object.values(filters).some(v=>v) || !!activeTag;

  const savePost = useCallback(async (form) => {
    const dbData = postToDb(form);
    const isUpdate = posts.some(p => p.id === form.id);
    // Optimistic update
    setPosts(ps => isUpdate ? ps.map(p => p.id === form.id ? form : p) : [form, ...ps]);
    const { error } = isUpdate
      ? await supabaseClient.from('posts').update(dbData).eq('id', form.id)
      : await supabaseClient.from('posts').insert(dbData);
    if (error) {
      console.error('Erro ao salvar post:', error);
      alert('Erro ao salvar: ' + error.message);
      loadPosts(); // rollback
      return;
    }
    setSavedNotice(form.id);
    setTimeout(() => setSavedNotice(null), 4000);
  }, [posts, loadPosts]);

  const changeStatus = useCallback(async (id, newStatus) => {
    const post = posts.find(p => p.id === id);
    const autor = currentUser || '—';
    const entry = makeHistEntry(`${autor} alterou o status para ${newStatus}`, autor);
    const newHistorico = [...(post.historico || []), entry];
    setPosts(ps => ps.map(p => p.id === id ? {...p, status: newStatus, historico: newHistorico} : p));
    const { error } = await supabaseClient.from('posts')
      .update({ status: newStatus, historico: newHistorico, updated_at: new Date().toISOString() })
      .eq('id', id);
    if (error) { console.error('Erro ao atualizar status:', error); loadPosts(); }
  }, [posts, currentUser, loadPosts]);

  const deletePost = useCallback(async (id) => {
    setPosts(ps => ps.filter(p => p.id !== id)); // Optimistic
    const { error } = await supabaseClient.from('posts').delete().eq('id', id);
    if (error) { console.error('Erro ao excluir:', error); loadPosts(); }
  }, [loadPosts]);

  const addComment = useCallback(async (pid, c) => {
    const post = posts.find(p => p.id === pid);
    const newComments  = [...(post.comments || []), c];
    const entry        = makeHistEntry(`${c.autor} adicionou um comentário`, c.autor);
    const newHistorico = [...(post.historico || []), entry];
    setPosts(ps => ps.map(p => p.id === pid ? {...p, comments: newComments, historico: newHistorico} : p));
    const { error } = await supabaseClient.from('posts')
      .update({ comments: newComments, historico: newHistorico, updated_at: new Date().toISOString() })
      .eq('id', pid);
    if (error) { console.error('Erro ao salvar comentário:', error); loadPosts(); }
  }, [posts, loadPosts]);

  const addLead = useCallback(async (pid, c) => {
    const post = posts.find(p => p.id === pid);
    const newFeedback  = [...(post.feedbackLideranca || []), c];
    const entry        = makeHistEntry(`${c.autor} adicionou feedback da liderança`, c.autor);
    const newHistorico = [...(post.historico || []), entry];
    setPosts(ps => ps.map(p => p.id === pid ? {...p, feedbackLideranca: newFeedback, historico: newHistorico} : p));
    const { error } = await supabaseClient.from('posts')
      .update({ feedback_lideranca: newFeedback, historico: newHistorico, updated_at: new Date().toISOString() })
      .eq('id', pid);
    if (error) { console.error('Erro ao salvar feedback:', error); loadPosts(); }
  }, [posts, loadPosts]);

  // ── Edição inline (LinkedInModal) ────────────────────────────────────────
  const saveInline = useCallback(async (field, newValue) => {
    console.log('[allu] saveInline →', field, newValue);
    if (!viewPostId) return { error: 'Post não encontrado' };
    const post = posts.find(p => p.id === viewPostId);
    if (!post) return { error: 'Post não encontrado' };

    // Conflict detection
    const { data: fresh } = await supabaseClient.from('posts').select('updated_at').eq('id', viewPostId).single();
    if (fresh?.updated_at && post.updated_at && fresh.updated_at !== post.updated_at) {
      console.warn('[allu] saveInline: conflito detectado', { local: post.updated_at, remote: fresh.updated_at });
      return { conflict: true };
    }

    const oldValue = post[field];
    if (String(oldValue||'').trim() === String(newValue||'').trim()) { console.log('[allu] saveInline: sem mudança'); return { ok: true }; }

    const autor  = currentUser || '—';
    const label  = FIELD_LABEL[field] || field;
    const entry  = makeHistEntry(`${autor} alterou ${label}`, autor, oldValue, newValue);
    const newHistorico = [...(post.historico || []), entry];
    const updatedPost  = { ...post, [field]: newValue, historico: newHistorico, updated_at: new Date().toISOString() };

    setPosts(ps => ps.map(p => p.id === viewPostId ? updatedPost : p));

    const dbField = FIELD_TO_DB[field];
    if (!dbField) return { error: 'Campo não mapeado' };

    console.log('[allu] saveInline: atualizando Supabase', { dbField, newValue });
    const { error } = await supabaseClient.from('posts')
      .update({ [dbField]: newValue, historico: newHistorico, updated_at: updatedPost.updated_at })
      .eq('id', viewPostId);
    if (error) { console.error('[allu] saveInline error:', error); loadPosts(); return { error: error.message }; }
    console.log('[allu] saveInline: Supabase atualizado com sucesso');
    return { ok: true };
  }, [viewPostId, posts, currentUser, loadPosts]);

  const handleTagClick = useCallback((t) => setActiveTag(v => v===t ? '' : t), []);

  const openEdit = useCallback((p) => setEditPost(p), []);
  const closeModal = useCallback(() => { setShowAdd(false); setEditPost(null); }, []);
  const closeViewPost = useCallback(() => setViewPostId(null), []);
  const closeConfirm = useCallback(() => setConfirm(null), []);

  const sc = "border border-gray-200 rounded-xl px-3 py-2 text-sm bg-white text-gray-700 cursor-pointer focus:ring-0";

  return (
    <div style={{minHeight:'100vh',background:'#F5F5F5'}}>

      {/* Header */}
      <header className="sticky top-0 z-30 bg-white border-b border-gray-100" style={{boxShadow:'0 1px 12px rgba(0,0,0,0.06)'}}>
        <div className="max-w-7xl mx-auto px-6 py-3.5 flex items-center justify-between gap-4">
          <div className="flex items-center gap-3">
            <AlluLogo size={36} />
            <div>
              <div className="flex items-center gap-2">
                <h1 className="font-extrabold text-base leading-tight" style={{color:'#111111',fontWeight:800}}>Painel de Publicações LinkedIn</h1>
                <span style={{fontSize:9,fontWeight:800,background:'#1E8549',color:'#fff',padding:'2px 7px',borderRadius:999,letterSpacing:'0.05em',whiteSpace:'nowrap'}}>INLINE EDIT v2</span>
              </div>
              <p className="text-xs text-gray-400 leading-tight">Acompanhe, revise e aprove os conteúdos antes da publicação.</p>
            </div>
          </div>
          <div className="flex items-center gap-3">
            {currentUser ? (
              <button
                onClick={() => { const n = prompt('Alterar nome:', currentUser); if (n?.trim()) handleUserName(n.trim()); }}
                title="Clique para alterar seu nome"
                style={{display:'flex',alignItems:'center',gap:8,padding:'6px 12px 6px 6px',borderRadius:999,border:'1.5px solid #e5e7eb',background:'#fff',cursor:'pointer',transition:'border-color 0.15s',outline:'none'}}
                onMouseEnter={e=>e.currentTarget.style.borderColor='#1E8549'}
                onMouseLeave={e=>e.currentTarget.style.borderColor='#e5e7eb'}
              >
                <div style={{width:28,height:28,borderRadius:'50%',background:'linear-gradient(135deg,#1E8549,#0F3D2E)',display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontWeight:800,fontSize:12,flexShrink:0}}>
                  {currentUser[0].toUpperCase()}
                </div>
                <span style={{fontSize:13,fontWeight:600,color:'#111',whiteSpace:'nowrap'}}>{currentUser}</span>
                <Ic n="chevron-down" size={12} color="#9ca3af" />
              </button>
            ) : (
              <button onClick={()=>setShowUserModal(true)} style={{fontSize:12,fontWeight:600,color:'#1E8549',padding:'6px 14px',borderRadius:999,border:'1.5px solid #1E8549',background:'#fff',cursor:'pointer'}}>

              </div>
              <p className="text-gray-500 text-sm">Nenhum post encontrado com os filtros aplicados.</p>
              <button onClick={clearFilters} className="text-xs font-semibold hover:underline" style={{color:'#1E8549'}}>Limpar filtros</button>
            </div>
          </div>
        ) : (
          <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">
            {filtered.map(post => (
              <PostCard
                key={post.id}
                post={post}
                onView={p => setViewPostId(p.id)}
                onEdit={openEdit}
                onChangeStatus={changeStatus}
                onDelete={id=>setConfirm({id, msg:'Excluir este post permanentemente?', danger:true, cb:()=>deletePost(id)})}
                onAddComment={addComment}
                onAddLeadFeedback={addLead}
                activeTag={activeTag}
                onTagClick={handleTagClick}
                currentUser={currentUser}
              />
            ))}
          </div>
        )}
      </main>

      {/* Toast: post salvo mas oculto por filtro */}
      {savedNotice && (() => {
        const isVisible = filtered.some(p => p.id === savedNotice);
        const hasFilter = Object.values(filters).some(v=>v) || !!activeTag;
        if (hasFilter && !isVisible) return (
          <div className="fixed bottom-5 left-1/2 fade-in" style={{transform:'translateX(-50%)',zIndex:60,background:'#0F3D2E',color:'#fff',borderRadius:14,padding:'12px 20px',fontSize:13,fontWeight:600,boxShadow:'0 4px 20px rgba(0,0,0,0.2)',maxWidth:420,textAlign:'center',whiteSpace:'nowrap'}}>
            💚 Post salvo, mas oculto pelo filtro atual.{' '}
            <button onClick={clearFilters} style={{textDecoration:'underline',background:'none',border:'none',color:'#86efac',cursor:'pointer',fontWeight:700,fontSize:13}}>Limpar filtros</button>
          </div>
        );
        if (!isVisible) return null;
        return (
          <div className="fixed bottom-5 left-1/2 fade-in" style={{transform:'translateX(-50%)',zIndex:60,background:'#1E8549',color:'#fff',borderRadius:14,padding:'12px 20px',fontSize:13,fontWeight:600,boxShadow:'0 4px 20px rgba(0,0,0,0.2)',whiteSpace:'nowrap'}}>
            💚 Post salvo com sucesso!
          </div>
        );
      })()}

      {/* Modals */}
      {showUserModal && <UserModal onConfirm={handleUserName} />}
      {viewPost && <LinkedInModal post={viewPost} onClose={closeViewPost} onInlineEdit={saveInline} currentUser={currentUser} />}
      {(showAdd || editPost) && (
        <PostModal post={editPost||null} onClose={closeModal} onSave={savePost} currentUser={currentUser} />
      )}
      {confirm && (
        <ConfirmModal message={confirm.msg} danger={confirm.danger} onConfirm={confirm.cb} onClose={closeConfirm} />
      )}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
